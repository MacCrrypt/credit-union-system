services:
  - type: web
    name: credit-union-system
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        fromSecret: app-key
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase: postgres
      - key: DB_PORT
        fromDatabase: postgres
      - key: DB_DATABASE
        fromDatabase: postgres
      - key: DB_USERNAME
        fromDatabase: postgres
      - key: DB_PASSWORD
        fromDatabase: postgres
databases:
  - name: postgres
    databaseName: credit_union_db
    user: credit_union_user